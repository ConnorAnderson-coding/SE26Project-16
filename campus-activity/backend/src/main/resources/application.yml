server:
  port: 8080
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        same-site: lax
        secure: ${SESSION_COOKIE_SECURE:false}

spring:
  application:
    name: campus-activity-backend
  datasource:
    url: jdbc:h2:mem:campus_activity;MODE=MySQL;DATABASE_TO_UPPER=false
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: false
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

campus:
  demo-password: ${CAMPUS_DEMO_PASSWORD:}

springdoc:
  api-docs:
    enabled: false

community-clustering:
  python:
    enabled: ${CLUSTERING_SERVICE_ENABLED:false}
    base-url: ${CLUSTERING_SERVICE_BASE_URL:}
    connect-timeout: ${CLUSTERING_SERVICE_CONNECT_TIMEOUT:2s}
    read-timeout: ${CLUSTERING_SERVICE_READ_TIMEOUT:30s}
