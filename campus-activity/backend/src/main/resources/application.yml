server:
  port: 8080

spring:
  application:
    name: campus-activity-backend
  datasource:
    url: jdbc:h2:mem:campus_activity;MODE=MySQL;DATABASE_TO_UPPER=false
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  redis:
    host: localhost
    port: 6379

springdoc:
  api-docs:
    enabled: false
