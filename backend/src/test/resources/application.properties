spring.cache.type=simple
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.elasticsearch.autoconfigure.ElasticsearchClientAutoConfiguration,org.springframework.boot.elasticsearch.autoconfigure.ElasticsearchRestClientAutoConfiguration

app.elasticsearch.enabled=false

spring.datasource.url=jdbc:h2:mem:campus_activity;MODE=MySQL;DB_CLOSE_DELAY=-1;NON_KEYWORDS=USER
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

jwt.secret=campus-activity-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
jwt.expiration=86400000
app.cors.allowed-origins=http://localhost:5173
