spring.application.name=campus-activity
server.port=8080

# 默认连接 database/docker-compose.yml 发布到本机的端口（3306 / 6379 / 9200）
# 若本机另有 MySQL/Redis 占用端口，请先停本机服务或改 compose 端口映射，并通过环境变量覆盖下方配置
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/campus_activity?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci}
spring.datasource.username=${DB_USERNAME:campus}
spring.datasource.password=${DB_PASSWORD:campus123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Redis：campus-redis，无密码
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

spring.cache.type=redis
spring.cache.redis.time-to-live=30m
spring.cache.redis.key-prefix=campus:
spring.cache.redis.cache-null-values=false

# Elasticsearch：campus-elasticsearch（xpack.security.enabled=false），默认开启
# 本地未起 ES 时可设 ES_ENABLED=false；测试环境见 src/test/resources
spring.autoconfigure.exclude=org.springframework.boot.elasticsearch.autoconfigure.ElasticsearchClientAutoConfiguration,org.springframework.boot.elasticsearch.autoconfigure.ElasticsearchRestClientAutoConfiguration
spring.elasticsearch.uris=${ELASTICSEARCH_URIS:http://localhost:9200}
app.elasticsearch.enabled=${ES_ENABLED:true}
app.elasticsearch.auto-rebuild-on-startup=${ES_AUTO_REBUILD:true}
app.elasticsearch.index.activities=${ES_ACTIVITIES_INDEX:campus_activities}
# 全量重建时分批写入，避免 GTE ingest「inference process queue is full」
app.elasticsearch.bulk-batch-size=${ES_BULK_BATCH_SIZE:15}
app.elasticsearch.bulk-batch-delay-ms=${ES_BULK_BATCH_DELAY_MS:400}
app.elasticsearch.bulk-max-retries=${ES_BULK_MAX_RETRIES:6}
app.elasticsearch.embedding-model-id=${ES_EMBEDDING_MODEL:campus_gte}
app.elasticsearch.search-recall-size=${ES_SEARCH_RECALL:50}
app.elasticsearch.rrf-rank-constant=${ES_RRF_K:60}
app.elasticsearch.semantic-absolute-threshold=${ES_SEMANTIC_ABSOLUTE_THRESHOLD:0.90}
app.elasticsearch.relevance-bm25-weight=${ES_RELEVANCE_BM25_WEIGHT:0.50}
app.elasticsearch.relevance-semantic-weight=${ES_RELEVANCE_SEMANTIC_WEIGHT:0.35}
app.elasticsearch.relevance-keyword-bonus=${ES_RELEVANCE_KEYWORD_BONUS:0.15}
app.elasticsearch.relevance-semantic-only-weight=${ES_RELEVANCE_SEMANTIC_ONLY_WEIGHT:0.90}
app.elasticsearch.pref-history-size=${ES_PREF_HISTORY_SIZE:10}
app.elasticsearch.pref-half-life-days=${ES_PREF_HALF_LIFE_DAYS:30}
app.elasticsearch.pref-interest-mix=${ES_PREF_INTEREST_MIX:0.4}
app.elasticsearch.recommend-recall-size=${ES_RECOMMEND_RECALL:50}
app.elasticsearch.recommend-expand-recall-size=${ES_RECOMMEND_EXPAND:100}
app.elasticsearch.recommend-min-candidates=${ES_RECOMMEND_MIN_CAND:12}
app.elasticsearch.recommend-sim-span-min=${ES_RECOMMEND_SIM_SPAN:0.03}
app.elasticsearch.recommend-aux-scale=${ES_RECOMMEND_AUX_SCALE:0.25}
app.elasticsearch.recommend-tag-cap=${ES_RECOMMEND_TAG_CAP:2}
app.elasticsearch.recommend-social-ref=${ES_RECOMMEND_SOCIAL_REF:3.5}
app.elasticsearch.recommend-weight-sim=${ES_RECOMMEND_W_SIM:0.55}
app.elasticsearch.recommend-weight-tag=${ES_RECOMMEND_W_TAG:0.15}
app.elasticsearch.recommend-weight-social=${ES_RECOMMEND_W_SOCIAL:0.05}
app.elasticsearch.recommend-weight-hot=${ES_RECOMMEND_W_HOT:0.10}
app.elasticsearch.recommend-weight-time=${ES_RECOMMEND_W_TIME:0.05}

jwt.secret=${JWT_SECRET:campus-activity-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm}
jwt.expiration=${JWT_EXPIRATION:86400000}

app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

jaccount.enabled=${JACCOUNT_ENABLED:true}
jaccount.client-id=${JACCOUNT_CLIENT_ID:ov3SLrO4HyZSELxcHiqS}
jaccount.client-secret=${JACCOUNT_CLIENT_SECRET:B9919DDA3BD9FBF7ADB9F84F67920D8CB6528620B9586D1C}
jaccount.redirect-uri=${JACCOUNT_REDIRECT_URI:http://localhost:8080/api/v1/auth/jaccount/callback}
jaccount.frontend-callback-uri=${JACCOUNT_FRONTEND_CALLBACK_URI:http://localhost:5173/oauth/callback}
jaccount.frontend-logout-uri=${JACCOUNT_FRONTEND_LOGOUT_URI:http://localhost:5173/}
jaccount.authorization-uri=${JACCOUNT_AUTHORIZATION_URI:https://jaccount.sjtu.edu.cn/oauth2/authorize}
jaccount.token-uri=${JACCOUNT_TOKEN_URI:https://jaccount.sjtu.edu.cn/oauth2/token}
jaccount.profile-uri=${JACCOUNT_PROFILE_URI:https://api.sjtu.edu.cn/v1/me/profile}
jaccount.logout-uri=${JACCOUNT_LOGOUT_URI:https://jaccount.sjtu.edu.cn/oauth2/logout}
jaccount.scope=${JACCOUNT_SCOPE:profile}
jaccount.state-cookie-secure=${JACCOUNT_STATE_COOKIE_SECURE:false}
