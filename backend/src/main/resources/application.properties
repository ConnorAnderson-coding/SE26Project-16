spring.application.name=campus-activity
server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/campus_activity?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci}
spring.datasource.username=${DB_USERNAME:campus}
spring.datasource.password=${DB_PASSWORD:campus123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

spring.cache.type=redis
spring.cache.redis.time-to-live=30m
spring.cache.redis.key-prefix=campus:
spring.cache.redis.cache-null-values=false

jwt.secret=${JWT_SECRET:campus-activity-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm}
jwt.expiration=${JWT_EXPIRATION:86400000}

app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

# ── 智能分析 - LLM 配置 ──
app.analytics.llm.api-url=${ANALYTICS_LLM_API_URL:https://api.deepseek.com/v1/chat/completions}
app.analytics.llm.api-key=${DEEPSEEK_API_KEY:}
app.analytics.llm.model=${ANALYTICS_LLM_MODEL:deepseek-chat}
app.analytics.llm.timeout=${ANALYTICS_LLM_TIMEOUT:30s}
app.analytics.llm.max-retries=${ANALYTICS_LLM_MAX_RETRIES:3}
app.analytics.llm.max-tokens=${ANALYTICS_LLM_MAX_TOKENS:2000}
app.analytics.llm.temperature=${ANALYTICS_LLM_TEMPERATURE:0.7}
