services:
  mysql:
    image: public.ecr.aws/docker/library/mysql:8.0
    container_name: campus-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: campus_activity
      MYSQL_USER: campus
      MYSQL_PASSWORD: campus123
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    # max_allowed_packet：10k 级 seed 的批量 INSERT 需要更大包限制
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --skip-character-set-client-handshake
      --max_allowed_packet=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ucampus", "-pcampus123"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  redis:
    image: public.ecr.aws/docker/library/redis:7-alpine
    container_name: campus-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    build:
      context: ./elasticsearch
    image: campus-elasticsearch:8.15.0-ik
    container_name: campus-elasticsearch
    restart: unless-stopped
    environment:
      - node.name=campus-es
      - cluster.name=campus-es-cluster
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - xpack.ml.enabled=true
      - xpack.license.self_generated.type=trial
      - bootstrap.memory_lock=false
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
    ports:
      - "${ES_HTTP_PORT:-9200}:9200"
      - "${ES_TCP_PORT:-9300}:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=30s || exit 1"]
      interval: 15s
      timeout: 35s
      retries: 10
      start_period: 60s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: campus-kibana
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "${KIBANA_PORT:-5601}:5601"

  clustering-service:
    profiles: ["clustering"]
    build:
      context: ../clustering-service
    image: campus-clustering-service:local
    container_name: campus-clustering-service
    restart: unless-stopped
    ports:
      - "${CLUSTERING_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/internal/v1/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mysql_data:
  redis_data:
  es_data:
